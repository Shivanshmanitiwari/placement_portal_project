{% extends "base.html" %}

{% block title %}Create Placement Drive - Placement Portal{% endblock %}

{% block content %}
<h2><i class="fas fa-briefcase"></i> Create New Placement Drive</h2>
<hr>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('create_drive') }}">
            <div class="mb-3">
                <label for="job_title" class="form-label">Job Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="job_title" name="job_title" required>
            </div>

            <div class="mb-3">
                <label for="job_description" class="form-label">Job Description</label>
                <textarea class="form-control" id="job_description" name="job_description" rows="4" placeholder="Enter detailed job description"></textarea>
            </div>

            <div class="mb-3">
                <label for="eligibility_criteria" class="form-label">Eligibility Criteria</label>
                <textarea class="form-control" id="eligibility_criteria" name="eligibility_criteria" rows="3" placeholder="e.g., B.Tech in CS/IT, Good communication skills"></textarea>
            </div>

            <div class="mb-3">
                <label for="min_cgpa" class="form-label">Minimum CGPA</label>
                <input type="number" step="0.01" min="0" max="10" class="form-control" id="min_cgpa" name="min_cgpa" placeholder="e.g., 7.5">
                <small class="form-text text-muted">Leave blank if no CGPA requirement</small>
            </div>

            <div class="mb-3">
                <label for="application_deadline" class="form-label">Application Deadline <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="application_deadline" name="application_deadline" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Create Drive
                </button>
                <a href="{{ url_for('company_dashboard') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
