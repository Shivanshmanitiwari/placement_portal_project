{% extends "base.html" %}

{% block title %}Edit Placement Drive - Placement Portal{% endblock %}

{% block content %}
<h2><i class="fas fa-edit"></i> Edit Placement Drive</h2>
<hr>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_drive', drive_id=drive.id) }}">
            <div class="mb-3">
                <label for="job_title" class="form-label">Job Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="job_title" name="job_title" value="{{ drive.job_title }}" required>
            </div>

            <div class="mb-3">
                <label for="job_description" class="form-label">Job Description</label>
                <textarea class="form-control" id="job_description" name="job_description" rows="4">{{ drive.job_description or '' }}</textarea>
            </div>

            <div class="mb-3">
                <label for="eligibility_criteria" class="form-label">Eligibility Criteria</label>
                <textarea class="form-control" id="eligibility_criteria" name="eligibility_criteria" rows="3">{{ drive.eligibility_criteria or '' }}</textarea>
            </div>

            <div class="mb-3">
                <label for="min_cgpa" class="form-label">Minimum CGPA</label>
                <input type="number" step="0.01" min="0" max="10" class="form-control" id="min_cgpa" name="min_cgpa" value="{{ drive.min_cgpa or '' }}">
            </div>

            <div class="mb-3">
                <label for="application_deadline" class="form-label">Application Deadline <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="application_deadline" name="application_deadline" value="{{ drive.application_deadline }}" required>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{{ url_for('company_dashboard') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
