{% extends "base.html" %}

{% block title %}Edit Company - Admin - Placement Portal{% endblock %}

{% block content %}
<h2><i class="fas fa-building"></i> Edit Company (Admin)</h2>
<hr>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_company', company_id=company.id) }}">
            <div class="mb-3">
                <label for="name" class="form-label">Company Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name" value="{{ company.name }}" required>
            </div>
            
            <div class="mb-3">
                <label for="contact_email" class="form-label">Contact Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="contact_email" name="contact_email" value="{{ company.contact_email }}" required>
            </div>
            
            <div class="mb-3">
                <label for="website" class="form-label">Website</label>
                <input type="url" class="form-control" id="website" name="website" value="{{ company.website or '' }}">
            </div>
            
            <div class="mb-3">
                <label for="hr_contact" class="form-label">HR Contact</label>
                <input type="text" class="form-control" id="hr_contact" name="hr_contact" value="{{ company.hr_contact or '' }}">
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{{ url_for('companies') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
