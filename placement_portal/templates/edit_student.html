{% extends "base.html" %}

{% block title %}Edit Student - Admin - Placement Portal{% endblock %}

{% block content %}
<h2><i class="fas fa-user-edit"></i> Edit Student (Admin)</h2>
<hr>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('edit_student', student_id=student.id) }}">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="name" name="name" value="{{ student.name }}" required>
            </div>
            
            <div class="mb-3">
                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" name="email" value="{{ student.email }}" required>
            </div>
            
            <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" name="phone" value="{{ student.phone or '' }}">
            </div>
            
            <div class="mb-3">
                <label for="department" class="form-label">Department</label>
                <input type="text" class="form-control" id="department" name="department" value="{{ student.department or '' }}">
            </div>
            
            <div class="mb-3">
                <label for="year" class="form-label">Year</label>
                <select class="form-select" id="year" name="year">
                    <option value="">Select Year</option>
                    <option value="1" {% if student.year == 1 %}selected{% endif %}>1st Year</option>
                    <option value="2" {% if student.year == 2 %}selected{% endif %}>2nd Year</option>
                    <option value="3" {% if student.year == 3 %}selected{% endif %}>3rd Year</option>
                    <option value="4" {% if student.year == 4 %}selected{% endif %}>4th Year</option>
                </select>
            </div>
            
            <div class="mb-3">
                <label for="cgpa" class="form-label">CGPA</label>
                <input type="number" step="0.01" min="0" max="10" class="form-control" id="cgpa" name="cgpa" value="{{ student.cgpa or '' }}">
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Changes
                </button>
                <a href="{{ url_for('students') }}" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
